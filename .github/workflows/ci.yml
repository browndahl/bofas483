name: CI
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase shadow stack
        run: supabase start
      - name: Lint migrations
        run: supabase db lint --local --level warning
      - name: Verify RLS policies
        run: supabase test db
      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
