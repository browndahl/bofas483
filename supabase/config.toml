project_id = "bofas483"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:4830"
additional_redirect_urls = ["http://localhost:4830", "https://*.vercel.app"]
enable_signup = true
enable_anonymous_sign_ins = true

[functions.save-game]
verify_jwt = true
[functions.submit-score]
verify_jwt = true
[functions.compute-profile]
verify_jwt = true
[functions.health]
verify_jwt = false
